<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shoreline Web Design | Order</title>
  <link rel="icon" type="image/png" href="swd-logo.png">
  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Shoreline Web Design</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#pricing">Pricing</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="order-hero">
  <div class="container">
    <h1 class="text-secondary">Order Your Website ✨</h1>
    <p>Fill in your details below and we’ll send payment instructions via email. Simple, secure, and professional.</p>
  </div>
</section>

<!-- Form Section -->
<section class="pb-5">
  <div class="container">
    <div class="row justify-content-center">

      <div class="col-lg-7">
        <div class="glass-card">

          <h3 class="text-center mb-4">Website Order Form</h3>

          <form action="https://formsubmit.co/jennasm2019@gmail.com" method="POST" novalidate>

  <!-- Hidden settings -->
  <input type="hidden" name="_subject" value="New Website Order!">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_template" value="table">

  <!-- Name -->
  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input 
        type="text" 
        class="form-control" 
        name="Name" 
        placeholder="Your full name" 
        required
        minlength="3"
      >
    </div>
  </div>

  <!-- Email -->
  <div class="mb-3">
    <label class="form-label">Email Address</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-envelope"></i></span>
      <input 
        type="email" 
        class="form-control" 
        name="Email" 
        placeholder="you@example.com" 
        required
      >
    </div>
  </div>

  <!-- Bundle -->
  <div class="mb-3">
    <label class="form-label">Choose a Package</label>
    <select class="form-select" name="Bundle" required>
      <option value="">Select your package</option>
      <option>Basic – R500 (1-page website)</option>
      <option>Standard – R1200 (up to 5 pages)</option>
      <option>Premium – R2000+ (full website / e-commerce)</option>
    </select>
  </div>

  <!-- Notes -->
  <div class="mb-3">
    <label class="form-label">Project Details (optional)</label>
    <textarea 
      class="form-control" 
      name="Notes" 
      rows="4" 
      placeholder="Tell me about your website idea..."
      maxlength="1000"
    ></textarea>
  </div>

    <!-- Redirect after submit -->
  <input type="hidden" name="_next" value="https://shorelinewebdesign.netlify.app/thankyou.html">

  <button type="submit" class="btn btn-danger w-100">
    Submit Order 🚀
  </button>

</form>


        </div>
      </div>

    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  © 2026 Shoreline Web Design. All rights reserved.
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
