<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Coastline Web Design Studio</title>
  <meta http-equiv="refresh" content="5;url=index.html" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    .thank-card {
      animation: cardIn 0.5s ease-out;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .check-icon-svg {
      width: 64px;
      height: 64px;
    }

    .check-icon-svg circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      animation: circleDraw 0.5s ease-out forwards;
    }

    .check-icon-svg path {
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: checkDraw 0.3s 0.4s ease-out forwards;
    }

    @keyframes circleDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes checkDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    #countdown {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="thank-wrap">
    <div class="thank-card text-center p-5">
      <div class="check-icon mb-4">
        <svg class="check-icon-svg" viewBox="0 0 52 52" fill="none">
          <circle cx="26" cy="26" r="24" stroke="currentColor" stroke-width="3" />
          <path d="M14 27l7 7 17-17" stroke="currentColor" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </div>
      <h2 class="mb-2">You're All Set</h2>
      <p class="mb-1">Your request has been submitted successfully.</p>
      <p class="mb-3">We'll be in touch shortly with the next steps.</p>
      <small class="d-block mb-4">Redirecting you to the homepage in <span id="countdown">5</span> seconds...</small>
      <a href="index.html" class="btn-home">Return Now</a>
    </div>
  </div>

  <script>
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');
    const timer = setInterval(() => {
      seconds -= 1;
      if (seconds <= 0) {
        clearInterval(timer);
        countdownEl.textContent = '0';
      } else {
        countdownEl.textContent = seconds;
      }
    }, 1000);
  </script>

</body>

</html>
