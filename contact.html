<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shoreline Web Design Studio | Contact</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- NAV -->
<nav>
    <div class="container">
      <a class="nav-logo" href="index.html">Shoreline Web Design<span>.</span></a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="contact.html" class="nav-cta">Get a Quote</a></li>
      </ul>
    </div>
  </nav>


<!-- PAGE -->
<section class="page-wrap">
  <div class="container">

    <div class="label">Contact</div>

    <h1 class="section-title fade-up">
      Let’s <em>talk</em>
    </h1>

    <div class="contact-wrap">

      <!-- CONTACT INFO -->
      <div class="contact-box fade-up delay-1">

        <h3>Get in touch</h3>

        <div class="contact-info">
          <p>📍 Remote Studio</p>
          <p>📧 jennasm2019@gmail.com</p>
          <p>📞 066 253 1866</p>
        </div>

        <div class="divider"></div>

        <p style="color:var(--muted); font-size:.85rem;">
          Usually reply within 24 hours.
        </p>

      </div>

      <!-- FORM -->
      <div class="contact-box fade-up delay-2">

        <form action="thankyou.html">

          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>

          <textarea rows="6" placeholder="Your Message..." required></textarea>

          <button class="btn btn-gold" style="width:100%;">
            Send Message
          </button>

        </form>

      </div>

    </div>

  </div>
</section>

</body>
</html>
